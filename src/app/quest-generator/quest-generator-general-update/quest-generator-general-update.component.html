<p-dialog header="General Information" [modal]="true" [(visible)]="visible" [style]="{ 'max-width': '50rem' }">

    <!-- Language Selection -->
    <div class="d-flex justify-content-center pt-2">
      <div class="form-group pb-3">
        <input value="DE" [class]="'btn udq-language-button ' + (selectedLanguage() == 'DE' ? 'disabled btn-outline-light' : 'btn-outline-secondary')" (click)="switchLanguage('DE')">
        <input value="EN" [class]="'btn udq-language-button ' + (selectedLanguage() == 'EN' ? 'disabled btn-outline-light' : 'btn-outline-secondary')" (click)="switchLanguage('EN')">
        <input value="FR" [class]="'btn udq-language-button ' + (selectedLanguage() == 'FR' ? 'disabled btn-outline-light' : 'btn-outline-secondary')" (click)="switchLanguage('FR')">
      </div>
    </div>

     <!-- Translation -->
    <div class="d-flex justify-content-center pt-2">
      Current language is not well known to you?
    </div>
    <div class="d-flex justify-content-center ">
      Use our free Translation! <i class="bi bi-exclamation-circle-fill mx-1 h5" ngbTooltip="Note as a free service it can happen that we run out of free calls. if thats the case try again later or in some days or feel free to use google translate :)"></i>
    </div>
    <div class="d-flex justify-content-center pt-2">
      <input [value]="selectedLanguage() == 'DE' ? 'Translate from English' : 'Translate from German'" class="btn btn-outline-light"
        (click)="translateToCurrentLanguage()">
    </div>

    <!-- Name -->
    <div class="d-flex justify-content-center pt-2">
      <div class="form-group pb-3" translate="no">
        <label class="form-label"><i class="bi bi-text-paragraph"></i> Name ({{ selectedLanguage() }})</label><br>
        <input
      type="text"
      class="form-control"
      [value]="nameDe"
      (input)="nameDe = $any($event.target).value"
      [class]="'p-element p-inputwrapper p-inputtext d-' + (selectedLanguage() === 'DE' ? 'inline' : 'none')"
      [style]="{ 'min-width': '250px' }"
    />
      <input
      type="text"
      class="form-control"
      [value]="nameEn"
      (input)="nameEn = $any($event.target).value"
      [class]="'p-element p-inputwrapper p-inputtext d-' + (selectedLanguage() === 'EN' ? 'inline' : 'none')"
      [style]="{ 'min-width': '250px' }"
    />
      <input
      type="text"
      class="form-control"
      [value]="nameFr"
      (input)="nameFr = $any($event.target).value"
      [class]="'p-element p-inputwrapper p-inputtext d-' + (selectedLanguage() === 'FR' ? 'inline' : 'none')"
      [style]="{ 'min-width': '250px' }"
    />
      </div>
    </div>

    <app-quest-markdown-editor
      title="Quest Finished Notification"
      [(selectedLanguage)]="selectedLanguage"
      [(dataDe)]="notificationDe"
      [(dataEn)]="notificationEn"
      [(dataFr)]="notificationFr"></app-quest-markdown-editor>

    <p-divider />

    <!-- Submit -->
    <div class="d-flex justify-content-center pt-2">
      <input type="submit" [value]="isAdd ? 'Add Quest' : 'Update Quest'" class="btn btn-outline-light"
          [disabled]="!isGeneralQuestDataFilledOut()" (click)="updateQuest()">
    </div>
</p-dialog>
